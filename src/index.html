<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Rigo with Vanilla.js</title>
    <link rel="shortcut icon" href="./assets/img/4geeks.ico" />
    <script
      src="https://kit.fontawesome.com/072e5df971.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <ul class="filters">
      <li>
        <label>Include Cover</label>
        <select class="picker" for="includeCover">
          <option value="true">True</option>
          <option value="false" selected>False</option>
        </select>
      </li>

      <li>
        <label>Name</label>
        <input class="picker" for="name" type="text" value="Ramon" />
      </li>

      <li>
        <label>Last Name</label>
        <input class="picker" for="lastName" type="text" value="" />
      </li>

      <li>
        <label>S.M. Position</label>
        <select class="picker" for="socialMediaPosition">
          <option value="left">Left</option>
          <option value="right" selected>Right</option>
        </select>
      </li>

      <li>
        <label>Twitter</label>
        <input class="picker" for="twitter" type="text" value="" />
      </li>

      <li>
        <label>Github</label>
        <input class="picker" for="github" type="text" value="" />
      </li>

      <li>
        <label>LinkedIn</label>
        <input class="picker" for="linkedin" type="text" value="" />
      </li>

      <li>
        <label>Instagram</label>
        <input class="picker" for="instagram" type="text" value="" />
      </li>

      <li>
        <label>Role</label>
        <select class="picker" for="role">
          <option value="">null</option>
          <option value="Web Developer" selected>Web Developer</option>
          <option value="Floor Planner">Floor Planner</option>
          <option value="Technical Writter">Technical Writter</option>
        </select>
      </li>

      <li>
        <label>City</label>
        <select class="picker" for="city">
          <option value="">null</option>
          <option value="Miami" selected>Miami</option>
          <option value="Munich">Munich</option>
          <option value="Caracas">Caracas</option>
          <option value="Toronto">Toronto</option>
        </select>
      </li>

      <li>
        <label>Country</label>
        <select class="picker" for="country">
          <option value="">null</option>
          <option value="USA" selected>USA</option>
          <option value="Germany">Germany</option>
          <option value="Canada">Canada</option>
          <option value="Venezuela">Venezuela</option>
        </select>
      </li>
    </ul>

    <div id="widget_content"></div>

    <script type="text/javascript" src="/main.bundle.js"></script>
  </body>
</html>
